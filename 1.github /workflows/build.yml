name: Build APK

on:
  push:
    branches: [ main, master ] # Сборка запустится автоматически при пуше в эти ветки
  workflow_dispatch:          # Позволяет запускать сборку вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libsqlite3-dev libffi-dev libssl-dev cmake
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Build with Buildozer
      run: |
        # Запуск сборки в режиме отладки (debug)
        buildozer android debug
      env:
        # Принимаем лицензии SDK автоматически
        BUILDOZER_ACCEPT_ANDROID_SDK_LICENSES: 1

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ilkassages-apk
        path: bin/*.apk
